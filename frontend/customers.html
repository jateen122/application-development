<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Customers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <div class="nav-brand-icon">&#9881;</div>
    <span class="nav-brand-name">VehicleParts<span>Pro</span></span>
  </a>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="main">
  <div class="page-hd">
    <div class="page-hd-left">
      <div class="page-eyebrow">Registry</div>
      <h1 class="page-title">Customers</h1>
    </div>
    <button class="btn btn-primary" onclick="openModal('custModal')">+ Register Customer</button>
  </div>

  <div class="card">
    <div class="controls">
      <input class="search-input" id="custSearch" placeholder="Search by name, email, or phone..." oninput="searchCustomers()">
      <span class="muted" style="margin-left:auto"><span id="custCount">—</span> customers</span>
    </div>
    <div class="table-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Registered</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="custsBody">
          <tr><td colspan="6" class="tbl-empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal modal--wide">
    <div class="modal-hd">
      <div class="modal-title" id="detailName">Customer</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('detailModal')">Close</button>
    </div>
    <div id="detailContent">Loading...</div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="custModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="custModalTitle">Register Customer</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('custModal');resetCustForm()">Close</button>
    </div>
    <form id="custForm" onsubmit="saveCustomer(event)">
      <input type="hidden" id="custId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="input" id="fFirst" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="input" id="fLast" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="input" id="fEmail" type="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="input" id="fPhone" required>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input class="input" id="fAddress">
      </div>
      <div id="pwdGroup" class="form-group">
        <label class="form-label">Password</label>
        <input class="input" id="fPassword" type="password" placeholder="Min 6 characters">
      </div>
      <div id="vehicleSection" style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px">
        <div class="form-label" style="margin-bottom:12px;color:var(--text-2)">Vehicle (optional)</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Vehicle Number</label>
            <input class="input" id="fVNum" placeholder="e.g. BA1PA2222">
          </div>
          <div class="form-group">
            <label class="form-label">Make</label>
            <input class="input" id="fVMake" placeholder="Toyota">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Model</label>
            <input class="input" id="fVModel" placeholder="Hilux">
          </div>
          <div class="form-group">
            <label class="form-label">Year</label>
            <input class="input" id="fVYear" type="number" placeholder="2021">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Color</label>
            <input class="input" id="fVColor">
          </div>
          <div class="form-group">
            <label class="form-label">Fuel Type</label>
            <select class="input select" id="fVFuel">
              <option value="">Select...</option>
              <option>Petrol</option><option>Diesel</option><option>Electric</option><option>Hybrid</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('custModal');resetCustForm()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="custSubmitBtn">Register</button>
      </div>
    </form>
  </div>
</div>

<script src="auth.js"></script>
<script>
const user = requireRole('Admin', 'Staff');
if (user) { buildNav(); loadCustomers(); }

let allCustomers = [];

async function loadCustomers() {
  try {
    allCustomers = await API.get('/customers');
    renderCustomers(allCustomers);
  } catch (e) {
    document.getElementById('custsBody').innerHTML = '<tr><td colspan="6" class="tbl-empty">Failed to load.</td></tr>';
  }
}

function renderCustomers(list) {
  document.getElementById('custCount').textContent = list.length;
  const body = document.getElementById('custsBody');
  if (!list.length) { body.innerHTML = '<tr><td colspan="6" class="tbl-empty">No customers found</td></tr>'; return; }
  body.innerHTML = list.map(c => `
    <tr>
      <td class="text-strong">${c.firstName} ${c.lastName}</td>
      <td class="muted">${c.email}</td>
      <td class="mono">${c.phone}</td>
      <td class="muted">${c.address || '—'}</td>
      <td class="muted">${fmtDate(c.createdAt)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="viewCustomer(${c.id})">View</button>
          <button class="btn btn-outline btn-sm" onclick="editCustomer(${c.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id},'${c.firstName}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');
}

async function searchCustomers() {
  const q = document.getElementById('custSearch').value.trim();
  if (!q) { renderCustomers(allCustomers); return; }
  try {
    const res = await API.get(`/customers/search?q=${encodeURIComponent(q)}`);
    renderCustomers(res);
  } catch (_) {
    const lq = q.toLowerCase();
    renderCustomers(allCustomers.filter(c =>
      `${c.firstName} ${c.lastName} ${c.email} ${c.phone}`.toLowerCase().includes(lq)
    ));
  }
}

async function viewCustomer(id) {
  try {
    const d = await API.get(`/customers/${id}`);
    document.getElementById('detailName').textContent = `${d.firstName} ${d.lastName}`;
    document.getElementById('detailContent').innerHTML = `
      <div class="grid-2" style="margin-bottom:20px;gap:12px">
        <div><div class="form-label">Email</div><div>${d.email}</div></div>
        <div><div class="form-label">Phone</div><div class="mono">${d.phone}</div></div>
        <div><div class="form-label">Address</div><div>${d.address || '—'}</div></div>
        <div><div class="form-label">Registered</div><div class="muted">${fmtDate(d.createdAt)}</div></div>
      </div>
      <div class="form-label" style="margin-bottom:10px">Vehicles (${d.vehicles.length})</div>
      ${d.vehicles.length ? `
      <table class="tbl" style="margin-bottom:20px">
        <thead><tr><th>Number</th><th>Make</th><th>Model</th><th>Year</th><th>Fuel</th></tr></thead>
        <tbody>${d.vehicles.map(v => `<tr>
          <td><code>${v.vehicleNumber}</code></td><td>${v.make}</td><td>${v.model}</td>
          <td>${v.year}</td><td>${v.fuelType}</td>
        </tr>`).join('')}</tbody>
      </table>` : '<p class="muted" style="margin-bottom:20px">No vehicles registered</p>'}
      <div class="form-label" style="margin-bottom:10px">Recent Purchases (${d.recentPurchases.length})</div>
      ${d.recentPurchases.length ? `
      <table class="tbl">
        <thead><tr><th>Invoice</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>${d.recentPurchases.map(s => `<tr>
          <td><code>${s.invoiceNumber}</code></td>
          <td class="muted">${fmtDate(s.invoiceDate)}</td>
          <td class="amount">NPR ${fmt(s.totalAmount)}</td>
          <td><span class="status status-${s.status.toLowerCase()}">${s.status}</span></td>
        </tr>`).join('')}</tbody>
      </table>` : '<p class="muted">No purchases yet</p>'}
    `;
    openModal('detailModal');
  } catch (e) { notify('Failed to load customer', 'error'); }
}

function editCustomer(id) {
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  document.getElementById('custId').value = c.id;
  document.getElementById('fFirst').value   = c.firstName;
  document.getElementById('fLast').value    = c.lastName;
  document.getElementById('fEmail').value   = c.email;
  document.getElementById('fPhone').value   = c.phone;
  document.getElementById('fAddress').value = c.address || '';
  document.getElementById('pwdGroup').style.display       = 'none';
  document.getElementById('vehicleSection').style.display = 'none';
  document.getElementById('custModalTitle').textContent   = 'Edit Customer';
  document.getElementById('custSubmitBtn').textContent    = 'Update';
  openModal('custModal');
}

function resetCustForm() {
  document.getElementById('custId').value = '';
  document.getElementById('custForm').reset();
  document.getElementById('pwdGroup').style.display       = '';
  document.getElementById('vehicleSection').style.display = '';
  document.getElementById('custModalTitle').textContent   = 'Register Customer';
  document.getElementById('custSubmitBtn').textContent    = 'Register';
}

async function saveCustomer(e) {
  e.preventDefault();
  const id   = document.getElementById('custId').value;
  const base = {
    firstName: document.getElementById('fFirst').value,
    lastName:  document.getElementById('fLast').value,
    email:     document.getElementById('fEmail').value,
    phone:     document.getElementById('fPhone').value,
    address:   document.getElementById('fAddress').value,
  };
  try {
    if (id) {
      await API.put(`/customers/${id}`, base);
      notify('Customer updated!', 'success');
    } else {
      const vNum = document.getElementById('fVNum').value;
      const body = { ...base, password: document.getElementById('fPassword').value };
      if (vNum) {
        body.vehicle = {
          vehicleNumber: vNum,
          make:      document.getElementById('fVMake').value,
          model:     document.getElementById('fVModel').value,
          year:      parseInt(document.getElementById('fVYear').value) || 0,
          color:     document.getElementById('fVColor').value,
          fuelType:  document.getElementById('fVFuel').value,
        };
      }
      await API.post('/customers/register', body);
      notify('Customer registered!', 'success');
    }
    closeModal('custModal');
    resetCustForm();
    loadCustomers();
  } catch (err) { notify(err.message, 'error'); }
}

async function deleteCustomer(id, name) {
  if (!confirm(`Delete customer "${name}"?`)) return;
  try {
    await API.del(`/customers/${id}`);
    notify('Customer deleted', 'success');
    loadCustomers();
  } catch (err) { notify(err.message, 'error'); }
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) { closeModal(m.id); resetCustForm(); } });
});
</script>
</body>
</html>
