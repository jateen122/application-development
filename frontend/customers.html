<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Customers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
<style>
/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.pagination-info {
  color: var(--text-3);
  font-size: 14px;
}
.pagination-btns {
  display: flex;
  gap: 6px;
}
.pagination-btn {
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--bg);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.pagination-btn:hover {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}
.pagination-btn.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-name">VehicleParts Pro</span>
  </a>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="main">
  <div class="page-hd">
    <div class="page-hd-left">
      <div class="page-eyebrow">Registry</div>
      <h1 class="page-title">Customers</h1>
    </div>
    <button class="btn btn-primary" onclick="openModal('custModal')">+ Register Customer</button>
  </div>

  <div class="card">
    <div class="controls">
      <input class="search-input" id="custSearch" placeholder="Search by name, email, phone, or vehicle number…" oninput="searchCustomers()">
      <span class="muted" style="margin-left:auto"><span id="custCount">—</span> customers</span>
    </div>
    <div class="table-wrap">
      <table class="tbl">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Registered</th><th>Actions</th></tr>
        </thead>
        <tbody id="custsBody"><tr><td colspan="6" class="tbl-empty">Loading…</td></tr></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="custPagination">
      <div class="pagination-info" id="custPaginationInfo">Showing 1-10 of 0</div>
      <div class="pagination-btns" id="custPaginationBtns"></div>
    </div>
  </div>
</main>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="custModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="custModalTitle">Register Customer</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('custModal');resetCustForm()">Close</button>
    </div>
    <form id="custForm" onsubmit="saveCustomer(event)">
      <input type="hidden" id="custId">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name *</label><input class="input" id="fFirst" required></div>
        <div class="form-group"><label class="form-label">Last Name *</label><input class="input" id="fLast" required></div>
      </div>
      <div class="form-group"><label class="form-label">Email *</label><input class="input" id="fEmail" type="email" required></div>
      <div class="form-group"><label class="form-label">Phone *</label><input class="input" id="fPhone" required></div>
      <div class="form-group"><label class="form-label">Address</label><input class="input" id="fAddress"></div>
      <div id="pwdGroup" class="form-group">
        <label class="form-label">Password *</label>
        <input class="input" id="fPassword" type="password" placeholder="Min 6 characters">
      </div>
      <div id="vehicleSection" style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px">
        <div class="form-label" style="margin-bottom:12px;color:var(--text-2)">Vehicle (optional)</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Vehicle Number</label><input class="input" id="fVNum" placeholder="BA 1 PA 2222"></div>
          <div class="form-group"><label class="form-label">Make</label><input class="input" id="fVMake" placeholder="Toyota"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Model</label><input class="input" id="fVModel" placeholder="Hilux"></div>
          <div class="form-group"><label class="form-label">Year</label><input class="input" id="fVYear" type="number" placeholder="2021"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Color</label><input class="input" id="fVColor"></div>
          <div class="form-group">
            <label class="form-label">Fuel Type</label>
            <select class="input select" id="fVFuel">
              <option value="">Select…</option>
              <option>Petrol</option><option>Diesel</option><option>Electric</option><option>Hybrid</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('custModal');resetCustForm()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="custSubmitBtn">Register</button>
      </div>
    </form>
  </div>
</div>

<!-- Custom Delete Confirmation Modal -->
<div class="modal-overlay" id="deleteConfirmModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">Confirm Delete</div>
    </div>
    <div style="text-align:center; padding: 25px 30px 10px;">
      <div style="font-size:42px; color:var(--red); margin-bottom:12px;"></div>
      <p style="margin:10px 0 20px; font-size:15.5px;" id="deleteMessage"></p>
      <p style="color:var(--red); font-size:13px;">This action cannot be undone.</p>
    </div>
    <div class="form-actions" style="padding:15px 30px 25px;">
      <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete Customer</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
let allCustomers = [];
let currentPage = 1;
const itemsPerPage = 10;
let deletePendingId = null;
let deletePendingName = '';

const user = requireRole('Admin', 'Staff');
if (user) { 
  buildNav(); 
  loadCustomers(); 
}

async function loadCustomers() {
  try {
    allCustomers = await API.get('/customers');
    currentPage = 1;
    renderCustomers(allCustomers);
  } catch(e) {
    document.getElementById('custsBody').innerHTML =
      `<tr><td colspan="6" class="tbl-empty" style="color:var(--red)">Failed to load customers</td></tr>`;
  }
}

function renderCustomers(list) {
  const total = list.length;
  const totalPages = Math.ceil(total / itemsPerPage);
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const paginated = list.slice(start, end);

  document.getElementById('custCount').textContent = total;
  const body = document.getElementById('custsBody');

  if (!total) {
    body.innerHTML = '<tr><td colspan="6" class="tbl-empty">No customers found</td></tr>';
    updatePagination(total, totalPages);
    return;
  }

  body.innerHTML = paginated.map(c => `
    <tr>
      <td class="text-strong">${c.firstName} ${c.lastName}</td>
      <td class="muted">${c.email}</td>
      <td class="mono">${c.phone}</td>
      <td class="muted">${c.address || '—'}</td>
      <td class="muted">${fmtDate(c.createdAt)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <a href="customer-detail.html?id=${c.id}" class="btn btn-outline btn-sm">View</a>
          <button class="btn btn-outline btn-sm" onclick="editCustomer(${c.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="showDeleteConfirm(${c.id}, '${c.firstName} ${c.lastName}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');

  updatePagination(total, totalPages);
}

function updatePagination(total, totalPages) {
  const info = document.getElementById('custPaginationInfo');
  const btns = document.getElementById('custPaginationBtns');
  
  const start = (currentPage - 1) * itemsPerPage + 1;
  const end = Math.min(currentPage * itemsPerPage, total);
  
  info.textContent = total ? `Showing ${start}-${end} of ${total}` : 'No customers';

  let html = `<button class="pagination-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>Previous</button>`;
  
  const max = 5;
  let s = Math.max(1, currentPage - Math.floor(max/2));
  let e = Math.min(totalPages, s + max - 1);
  if (e - s < max - 1) s = Math.max(1, e - max + 1);

  for (let i = s; i <= e; i++) {
    html += `<button class="pagination-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
  }
  
  html += `<button class="pagination-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next</button>`;
  btns.innerHTML = html;
}

function changePage(page) {
  const totalPages = Math.ceil(allCustomers.length / itemsPerPage);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderCustomers(allCustomers);
}

let searchTimer = null;
async function searchCustomers() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('custSearch').value.trim();
    if (!q) { 
      currentPage = 1;
      renderCustomers(allCustomers); 
      return; 
    }
    try {
      const res = await API.get(`/customer-reports/search?q=${encodeURIComponent(q)}`);
      currentPage = 1;
      renderCustomers(res);
    } catch(_) {
      const lq = q.toLowerCase();
      const filtered = allCustomers.filter(c =>
        `${c.firstName} ${c.lastName} ${c.email} ${c.phone}`.toLowerCase().includes(lq)
      );
      currentPage = 1;
      renderCustomers(filtered);
    }
  }, 300);
}

function editCustomer(id) {
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  document.getElementById('custId').value   = c.id;
  document.getElementById('fFirst').value   = c.firstName;
  document.getElementById('fLast').value    = c.lastName;
  document.getElementById('fEmail').value   = c.email;
  document.getElementById('fPhone').value   = c.phone;
  document.getElementById('fAddress').value = c.address || '';
  document.getElementById('pwdGroup').style.display       = 'none';
  document.getElementById('vehicleSection').style.display = 'none';
  document.getElementById('custModalTitle').textContent   = 'Edit Customer';
  document.getElementById('custSubmitBtn').textContent    = 'Update';
  openModal('custModal');
}

function resetCustForm() {
  document.getElementById('custId').value = '';
  document.getElementById('custForm').reset();
  document.getElementById('pwdGroup').style.display       = '';
  document.getElementById('vehicleSection').style.display = '';
  document.getElementById('custModalTitle').textContent   = 'Register Customer';
  document.getElementById('custSubmitBtn').textContent    = 'Register';
}

async function saveCustomer(e) {
  e.preventDefault();
  const id   = document.getElementById('custId').value;
  const base = {
    firstName: document.getElementById('fFirst').value,
    lastName:  document.getElementById('fLast').value,
    email:     document.getElementById('fEmail').value,
    phone:     document.getElementById('fPhone').value,
    address:   document.getElementById('fAddress').value,
  };
  try {
    if (id) {
      await API.put(`/customers/${id}`, base);
      notify('Customer updated!', 'success');
    } else {
      const body = { ...base, password: document.getElementById('fPassword').value };
      const vNum = document.getElementById('fVNum').value.trim();
      if (vNum) {
        body.vehicle = {
          vehicleNumber: vNum,
          make:     document.getElementById('fVMake').value,
          model:    document.getElementById('fVModel').value,
          year:     parseInt(document.getElementById('fVYear').value) || 0,
          color:    document.getElementById('fVColor').value,
          fuelType: document.getElementById('fVFuel').value,
        };
      }
      await API.post('/customers/register', body);
      notify('Customer registered!', 'success');
    }
    closeModal('custModal');
    resetCustForm();
    loadCustomers();
  } catch(err) { notify(err.message, 'error'); }
}

// Custom Delete Modal
function showDeleteConfirm(id, name) {
  deletePendingId = id;
  deletePendingName = name;
  document.getElementById('deleteMessage').innerHTML = `Are you sure you want to delete <strong>${name}</strong>?`;
  openModal('deleteConfirmModal');
}

function closeDeleteModal() {
  closeModal('deleteConfirmModal');
  deletePendingId = null;
}

async function confirmDeleteCustomer() {
  if (!deletePendingId) return;
  try {
    await API.del(`/customers/${deletePendingId}`);
    notify('Customer deleted successfully', 'success');
    closeDeleteModal();
    loadCustomers();
  } catch(err) { 
    notify(err.message, 'error'); 
  }
}

// Attach confirm button
document.getElementById('confirmDeleteBtn').onclick = confirmDeleteCustomer;

// Modal backdrop
document.querySelectorAll('.modal-overlay').forEach(m =>
  m.addEventListener('click', e => { 
    if (e.target === m) { 
      closeModal(m.id); 
      if (m.id === 'custModal') resetCustForm();
      if (m.id === 'deleteConfirmModal') deletePendingId = null;
    } 
  })
);
</script>
</body>
</html>
