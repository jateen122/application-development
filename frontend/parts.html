<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Parts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-icon">⚙</span>
    <span class="brand-name">VehicleParts<span class="brand-accent">Pro</span></span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html" class="nav-link">Dashboard</a></li>
    <li><a href="parts.html" class="nav-link active">Parts</a></li>
    <li><a href="customers.html" class="nav-link">Customers</a></li>
    <li><a href="sales.html" class="nav-link">Sales</a></li>
    <li><a href="purchases.html" class="nav-link">Purchases</a></li>
    <li><a href="vendors.html" class="nav-link">Vendors</a></li>
    <li><a href="staff.html" class="nav-link">Staff</a></li>
  </ul>
</nav>

<main class="main-content">
  <header class="page-header">
    <div class="header-top">
      <div>
        <p class="page-label">INVENTORY</p>
        <h1 class="page-title">Parts Management</h1>
      </div>
      <button class="btn btn-primary" onclick="openModal('partModal')">+ Add Part</button>
    </div>
  </header>

  <div class="dash-card">
    <div class="controls-bar">
      <input class="search-input" type="text" id="searchInput" placeholder="Search by name or part number…" oninput="filterParts()">
      <select class="select-input" id="categoryFilter" onchange="filterParts()">
        <option value="">All Categories</option>
      </select>
      <span style="margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-3)">
        <span id="partCount">—</span> parts
      </span>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Part #</th>
            <th>Name</th>
            <th>Category</th>
            <th>Cost</th>
            <th>Selling</th>
            <th>Stock</th>
            <th>Updated</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="partsBody">
          <tr><td colspan="8" class="table-empty">Loading parts…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- ADD/EDIT PART MODAL -->
<div class="modal-overlay" id="partModal">
  <div class="modal">
    <h2 class="modal-title" id="partModalTitle">Add Part</h2>
    <form id="partForm" onsubmit="savePart(event)">
      <input type="hidden" id="partId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Part Name *</label>
          <input class="form-input" id="fPartName" required placeholder="e.g. Brake Pad">
        </div>
        <div class="form-group">
          <label class="form-label">Part Number *</label>
          <input class="form-input" id="fPartNumber" required placeholder="e.g. BP-001">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Category *</label>
        <input class="form-input" id="fPartCategory" required placeholder="e.g. Brakes">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="fPartDesc" placeholder="Brief description…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cost Price (NPR) *</label>
          <input class="form-input" id="fCostPrice" type="number" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">Selling Price (NPR) *</label>
          <input class="form-input" id="fSellingPrice" type="number" step="0.01" min="0" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Stock Quantity</label>
        <input class="form-input" id="fStockQty" type="number" min="0" value="0">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('partModal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="partSubmitBtn">Add Part</button>
      </div>
    </form>
  </div>
</div>

<script src="api.js"></script>
<script>
let allParts = [];

async function loadParts() {
  try {
    allParts = await API.get('/parts');
    renderParts(allParts);
    loadCategories();
  } catch (e) {
    document.getElementById('partsBody').innerHTML = '<tr><td colspan="8" class="table-empty error">Failed to load parts. Is the backend running?</td></tr>';
  }
}

function renderParts(parts) {
  document.getElementById('partCount').textContent = parts.length;
  const body = document.getElementById('partsBody');
  if (!parts.length) {
    body.innerHTML = '<tr><td colspan="8" class="table-empty">No parts found</td></tr>';
    return;
  }
  body.innerHTML = parts.map(p => `
    <tr>
      <td><code>${p.partNumber}</code></td>
      <td style="color:var(--text);font-weight:500">${p.name}</td>
      <td><span class="badge" style="background:var(--accent-2-dim);color:var(--accent-2)">${p.category}</span></td>
      <td class="amount">NPR ${fmt(p.costPrice)}</td>
      <td class="amount">NPR ${fmt(p.sellingPrice)}</td>
      <td>${stockBadge(p.stockQty)}</td>
      <td style="font-size:11px;color:var(--text-3)">${fmtDate(p.updatedAt)}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="editPart(${p.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deletePart(${p.id},'${p.name}')">Del</button>
        </div>
      </td>
    </tr>`).join('');
}

function stockBadge(qty) {
  if (qty === 0) return `<span class="qty-badge danger">0</span>`;
  if (qty < 10) return `<span class="qty-badge warn">${qty}</span>`;
  return `<span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--success)">${qty}</span>`;
}

async function loadCategories() {
  try {
    const cats = await API.get('/parts/categories');
    const sel = document.getElementById('categoryFilter');
    cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  } catch (_) {}
}

function filterParts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const filtered = allParts.filter(p =>
    (!cat || p.category === cat) &&
    (!q || p.name.toLowerCase().includes(q) || p.partNumber.toLowerCase().includes(q))
  );
  renderParts(filtered);
}

function editPart(id) {
  const p = allParts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('partId').value = p.id;
  document.getElementById('fPartName').value = p.name;
  document.getElementById('fPartNumber').value = p.partNumber;
  document.getElementById('fPartCategory').value = p.category;
  document.getElementById('fPartDesc').value = p.description;
  document.getElementById('fCostPrice').value = p.costPrice;
  document.getElementById('fSellingPrice').value = p.sellingPrice;
  document.getElementById('fStockQty').value = p.stockQty;
  document.getElementById('partModalTitle').textContent = 'Edit Part';
  document.getElementById('partSubmitBtn').textContent = 'Update Part';
  openModal('partModal');
}

function resetPartForm() {
  document.getElementById('partId').value = '';
  document.getElementById('partForm').reset();
  document.getElementById('partModalTitle').textContent = 'Add Part';
  document.getElementById('partSubmitBtn').textContent = 'Add Part';
}

document.querySelector('#partModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) { closeModal('partModal'); resetPartForm(); }
});

async function savePart(e) {
  e.preventDefault();
  const id = document.getElementById('partId').value;
  const body = {
    name: document.getElementById('fPartName').value,
    partNumber: document.getElementById('fPartNumber').value,
    category: document.getElementById('fPartCategory').value,
    description: document.getElementById('fPartDesc').value,
    costPrice: parseFloat(document.getElementById('fCostPrice').value),
    sellingPrice: parseFloat(document.getElementById('fSellingPrice').value),
    stockQty: parseInt(document.getElementById('fStockQty').value) || 0
  };
  try {
    if (id) { await API.put(`/parts/${id}`, body); notify('Part updated!', 'success'); }
    else { await API.post('/parts', body); notify('Part added!', 'success'); }
    closeModal('partModal');
    resetPartForm();
    loadParts();
  } catch (err) {
    notify(err.message, 'error');
  }
}

async function deletePart(id, name) {
  if (!confirm(`Delete part "${name}"? This cannot be undone.`)) return;
  try {
    await API.del(`/parts/${id}`);
    notify('Part deleted', 'success');
    loadParts();
  } catch (err) {
    notify(err.message, 'error');
  }
}

loadParts();
</script>
</body>
</html>
