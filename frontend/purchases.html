<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Purchases</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
<style>
.pi-items-list { display: flex; flex-direction: column; gap: 8px; }
.pi-item-row { display: grid; grid-template-columns: 1fr 80px 120px auto; gap: 8px; align-items: end; }
.pi-item-row .form-group { margin-bottom: 0; }
.remove-item { background: none; border: none; color: var(--red); cursor: pointer; font-size: 18px; padding: 10px 8px; line-height: 1; }
.add-item-btn { background: none; border: 1px dashed var(--border-2); border-radius: var(--radius); color: var(--text-3); cursor: pointer; padding: 8px; width: 100%; font-size: 12px; font-family: 'Space Mono', monospace; letter-spacing: 1px; transition: all 0.2s; margin-top: 8px; }
.add-item-btn:hover { border-color: var(--blue); color: var(--blue); }
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <div class="nav-brand-icon">&#9881;</div>
    <span class="nav-brand-name">VehicleParts<span>Pro</span></span>
  </a>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="main">
  <div class="page-hd">
    <div class="page-hd-left">
      <div class="page-eyebrow">Procurement</div>
      <h1 class="page-title">Purchase Invoices</h1>
    </div>
    <button class="btn btn-primary" onclick="openModal('piModal')">+ New Purchase</button>
  </div>

  <div class="card">
    <div class="controls">
      <select class="select-filter" id="piStatusFilter" onchange="filterPurchases()">
        <option value="">All Statuses</option>
        <option>Pending</option><option>Received</option><option>Cancelled</option>
      </select>
      <select class="select-filter" id="piVendorFilter" onchange="filterPurchases()">
        <option value="">All Vendors</option>
      </select>
      <span class="muted" style="margin-left:auto"><span id="piCount">0</span> invoices</span>
    </div>
    <div class="table-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>Invoice #</th>
            <th>Date</th>
            <th>Vendor</th>
            <th>Items</th>
            <th>Total</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="piBody"><tr><td colspan="7" class="tbl-empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-overlay" id="piDetailModal">
  <div class="modal modal--wide">
    <div class="modal-hd">
      <div class="modal-title" id="piDetailTitle">Invoice</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('piDetailModal')">Close</button>
    </div>
    <div id="piDetailContent">Loading...</div>
  </div>
</div>

<div class="modal-overlay" id="piModal">
  <div class="modal modal--wide">
    <div class="modal-hd">
      <div class="modal-title">New Purchase Invoice</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('piModal');resetPiForm()">Close</button>
    </div>
    <p style="font-size:12px;color:var(--green);margin-bottom:20px;font-family:'Space Mono',monospace">Stock updates automatically on creation</p>
    <form id="piForm" onsubmit="createPurchase(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Vendor</label>
          <select class="input select" id="fPiVendor" required>
            <option value="">Select vendor...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Invoice Date</label>
          <input class="input" id="fPiDate" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Items</label>
        <div class="pi-items-list" id="piItemsList"></div>
        <button type="button" class="add-item-btn" onclick="addPiItem()">+ Add Part</button>
      </div>
      <div id="piTotal" style="display:none;margin-top:16px;padding:12px;background:var(--bg);border-radius:var(--radius);text-align:right">
        <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--blue)">
          Total: <span id="piTotalAmt">NPR 0.00</span>
        </span>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('piModal');resetPiForm()">Cancel</button>
        <button type="submit" class="btn btn-primary">Create & Receive</button>
      </div>
    </form>
  </div>
</div>

<script src="auth.js"></script>
<script>
const user = requireRole('Admin');
if (user) { buildNav(); init(); }

let allPI = [], allVendors = [], allParts = [];

async function init() {
  document.getElementById('fPiDate').value = new Date().toISOString().split('T')[0];
  try {
    [allPI, allVendors, allParts] = await Promise.all([
      API.get('/purchase-invoices'), API.get('/vendors'), API.get('/parts')
    ]);
    renderPI(allPI);
    allVendors.forEach(v => {
      const o1 = document.createElement('option'); o1.value = v.id; o1.textContent = v.name;
      document.getElementById('fPiVendor').appendChild(o1);
      const o2 = document.createElement('option'); o2.value = v.id; o2.textContent = v.name;
      document.getElementById('piVendorFilter').appendChild(o2);
    });
  } catch (e) {
    document.getElementById('piBody').innerHTML = '<tr><td colspan="7" class="tbl-empty">Failed to load</td></tr>';
  }
}

function renderPI(list) {
  document.getElementById('piCount').textContent = list.length;
  const body = document.getElementById('piBody');
  if (!list.length) { body.innerHTML = '<tr><td colspan="7" class="tbl-empty">No purchase invoices yet</td></tr>'; return; }
  body.innerHTML = list.map(p => `
    <tr>
      <td><code>${p.invoiceNumber}</code></td>
      <td class="muted">${fmtDate(p.invoiceDate)}</td>
      <td class="text-strong">${p.vendorName}</td>
      <td class="mono">${p.itemCount} item${p.itemCount !== 1 ? 's' : ''}</td>
      <td class="amount text-blue">NPR ${fmt(p.totalAmount)}</td>
      <td><span class="status status-${p.status.toLowerCase()}">${p.status}</span></td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="viewPI(${p.id})">View</button>
          ${p.status === 'Received' ? `<button class="btn btn-danger btn-sm" onclick="cancelPI(${p.id})">Cancel</button>` : ''}
          ${p.status === 'Pending' ? `<button class="btn btn-primary btn-sm" onclick="receivePI(${p.id})">Receive</button>` : ''}
        </div>
      </td>
    </tr>`).join('');
}

function filterPurchases() {
  const s = document.getElementById('piStatusFilter').value;
  const v = document.getElementById('piVendorFilter').value;
  renderPI(allPI.filter(p => (!s || p.status === s) && (!v || p.vendorId == v)));
}

let piIdx = 0;
function addPiItem() {
  piIdx++;
  const idx = piIdx;
  const row = document.createElement('div');
  row.className = 'pi-item-row';
  row.id = `piItem${idx}`;
  row.innerHTML = `
    <div class="form-group">
      <label class="form-label">Part</label>
      <select class="input select" id="piPart${idx}" onchange="calcPiTotal()" required>
        <option value="">Select...</option>
        ${allParts.map(p => `<option value="${p.id}">${p.name} (${p.partNumber})</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Qty</label>
      <input class="input" id="piQty${idx}" type="number" min="1" value="1" onchange="calcPiTotal()" required>
    </div>
    <div class="form-group">
      <label class="form-label">Unit Cost (NPR)</label>
      <input class="input" id="piCost${idx}" type="number" step="0.01" min="0" placeholder="0.00" onchange="calcPiTotal()" required>
    </div>
    <button type="button" class="remove-item" onclick="document.getElementById('piItem${idx}').remove();calcPiTotal()">×</button>`;
  document.getElementById('piItemsList').appendChild(row);
  document.getElementById('piTotal').style.display = 'block';
}

function calcPiTotal() {
  let total = 0;
  document.querySelectorAll('.pi-item-row').forEach(row => {
    const qty = row.querySelector('input[id^="piQty"]');
    const cost = row.querySelector('input[id^="piCost"]');
    if (qty && cost) total += (parseInt(qty.value) || 0) * (parseFloat(cost.value) || 0);
  });
  document.getElementById('piTotalAmt').textContent = `NPR ${fmt(total)}`;
}

async function viewPI(id) {
  try {
    const pi = await API.get(`/purchase-invoices/${id}`);
    document.getElementById('piDetailTitle').textContent = pi.invoiceNumber;
    document.getElementById('piDetailContent').innerHTML = `
      <div class="grid-2" style="margin-bottom:20px;gap:12px">
        <div><div class="form-label">Vendor</div><div class="text-strong">${pi.vendor.name}</div><div class="muted">${pi.vendor.contactPerson}</div></div>
        <div><div class="form-label">Date</div><div>${fmtDate(pi.invoiceDate)}</div></div>
        <div><div class="form-label">Status</div><span class="status status-${pi.status.toLowerCase()}">${pi.status}</span></div>
      </div>
      <table class="tbl" style="margin-bottom:16px">
        <thead><tr><th>Part</th><th>Part #</th><th>Qty</th><th>Unit Cost</th><th>Line Total</th></tr></thead>
        <tbody>${pi.items.map(i => `<tr>
          <td class="text-strong">${i.partName}</td><td><code>${i.partNumber}</code></td>
          <td class="mono">${i.quantity}</td>
          <td class="amount">NPR ${fmt(i.unitCost)}</td>
          <td class="amount">NPR ${fmt(i.lineTotal)}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div style="text-align:right;padding:12px;background:var(--bg);border-radius:var(--radius)">
        <span style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--blue)">TOTAL: NPR ${fmt(pi.totalAmount)}</span>
      </div>`;
    openModal('piDetailModal');
  } catch (e) { notify('Failed to load invoice', 'error'); }
}

async function receivePI(id) {
  if (!confirm('Mark as Received? Stock quantities will be updated.')) return;
  try {
    await API.patch(`/purchase-invoices/${id}/status`, { status: 'Received' });
    notify('Invoice received and stock updated', 'success');
    allPI = await API.get('/purchase-invoices');
    renderPI(allPI);
  } catch (err) { notify(err.message, 'error'); }
}

async function cancelPI(id) {
  if (!confirm('Cancel this invoice? Stock will be reversed.')) return;
  try {
    await API.patch(`/purchase-invoices/${id}/status`, { status: 'Cancelled' });
    notify('Invoice cancelled and stock reversed', 'success');
    allPI = await API.get('/purchase-invoices');
    renderPI(allPI);
  } catch (err) { notify(err.message, 'error'); }
}

async function createPurchase(e) {
  e.preventDefault();
  const items = [];
  document.querySelectorAll('.pi-item-row').forEach(row => {
    const part = row.querySelector('select');
    const qty = row.querySelector('input[id^="piQty"]');
    const cost = row.querySelector('input[id^="piCost"]');
    if (part && part.value && qty && cost) {
      items.push({ partId: parseInt(part.value), quantity: parseInt(qty.value), unitCost: parseFloat(cost.value) });
    }
  });
  if (!items.length) { notify('Add at least one item', 'error'); return; }
  const body = {
    vendorId: parseInt(document.getElementById('fPiVendor').value),
    invoiceDate: new Date(document.getElementById('fPiDate').value).toISOString(),
    items
  };
  try {
    await API.post('/purchase-invoices', body);
    notify('Purchase invoice created and stock updated', 'success');
    closeModal('piModal');
    resetPiForm();
    allPI = await API.get('/purchase-invoices');
    renderPI(allPI);
  } catch (err) { notify(err.message, 'error'); }
}

function resetPiForm() {
  document.getElementById('piForm').reset();
  document.getElementById('piItemsList').innerHTML = '';
  document.getElementById('piTotal').style.display = 'none';
  piIdx = 0;
  document.getElementById('fPiDate').value = new Date().toISOString().split('T')[0];
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
});
</script>
</body>
</html>
