<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Vehicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
<style>
.cust-dropdown { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 4px; max-height: 180px; overflow-y: auto; display: none; }
.cust-option { padding: 10px 13px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; }
.cust-option:last-child { border-bottom: none; }
.cust-option:hover { background: var(--bg); }
.cust-option-name { font-weight: 600; font-size: 13.5px; color: var(--text); }
.cust-option-sub  { font-size: 11.5px; color: var(--text-3); font-family: 'Space Mono', monospace; }
.selected-cust { display: none; margin-top: 8px; padding: 8px 12px; background: var(--blue-dim); border: 1px solid var(--blue); border-radius: var(--radius); font-size: 13px; color: var(--blue); }

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.pagination-info {
  color: var(--text-3);
  font-size: 14px;
}
.pagination-btns {
  display: flex;
  gap: 6px;
}
.pagination-btn {
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--bg);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.pagination-btn:hover {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}
.pagination-btn.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-name">VehicleParts Pro</span>
  </a>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="main">
  <div class="page-hd">
    <div class="page-hd-left">
      <div class="page-eyebrow">Fleet</div>
      <h1 class="page-title">Registered Vehicles</h1>
    </div>
    <button class="btn btn-primary" onclick="openModal('vehModal')">+ Add Vehicle</button>
  </div>

  <div class="card">
    <div class="controls">
      <input class="search-input" id="vehSearch" placeholder="Search by number, make, model, or customer..." oninput="filterVehicles()">
      <select class="select-filter" id="fuelFilter" onchange="filterVehicles()">
        <option value="">All Fuel Types</option>
        <option>Petrol</option><option>Diesel</option><option>Electric</option><option>Hybrid</option>
      </select>
      <span class="muted" style="margin-left:auto"><span id="vehCount">—</span> vehicles</span>
    </div>
    <div class="table-wrap">
      <table class="tbl">
        <thead>
          <tr><th>Vehicle #</th><th>Make / Model</th><th>Year</th><th>Color</th><th>Fuel</th><th>Owner</th><th>Registered</th><th>Actions</th></tr>
        </thead>
        <tbody id="vehBody">
          <tr><td colspan="8" class="tbl-empty">Loading vehicles...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="vehPagination">
      <div class="pagination-info" id="vehPaginationInfo">Showing 1-10 of 0</div>
      <div class="pagination-btns" id="vehPaginationBtns"></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="vehModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="vehModalTitle">Add Vehicle</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('vehModal');resetVehForm()">Close</button>
    </div>
    <form id="vehForm" onsubmit="saveVehicle(event)">
      <input type="hidden" id="vehId">
      <input type="hidden" id="vehCustomerId">
      <div class="form-group" id="custSearchGroup">
        <label class="form-label">Customer</label>
        <input class="input" id="custSearchInput" placeholder="Type name or email to search..." oninput="searchCustomer()">
        <div class="cust-dropdown" id="custDropdown"></div>
        <div class="selected-cust" id="selectedCust"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Vehicle Number</label><input class="input" id="fVNum" required placeholder="BA 1 PA 2222"></div>
        <div class="form-group"><label class="form-label">Make</label><input class="input" id="fVMake" required placeholder="Toyota"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Model</label><input class="input" id="fVModel" required placeholder="Hilux"></div>
        <div class="form-group"><label class="form-label">Year</label><input class="input" id="fVYear" type="number" min="1980" max="2030" required placeholder="2021"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Color</label><input class="input" id="fVColor" placeholder="White"></div>
        <div class="form-group">
          <label class="form-label">Fuel Type</label>
          <select class="input select" id="fVFuel" required>
            <option value="">Select...</option>
            <option>Petrol</option><option>Diesel</option><option>Electric</option><option>Hybrid</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('vehModal');resetVehForm()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="vehSubmitBtn">Add Vehicle</button>
      </div>
    </form>
  </div>
</div>

<!-- Custom Delete Confirmation Modal -->
<div class="modal-overlay" id="deleteConfirmModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">Confirm Delete</div>
    </div>
    <div style="text-align:center; padding: 25px 30px 10px;">
      <div style="font-size:42px; color:var(--red); margin-bottom:12px;">🗑️</div>
      <p style="margin:10px 0 20px; font-size:15.5px;" id="deleteMessage"></p>
      <p style="color:var(--red); font-size:13px;">This action cannot be undone.</p>
    </div>
    <div class="form-actions" style="padding:15px 30px 25px;">
      <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete Vehicle</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
let allVehicles = [], allCustomers = [];
let currentPage = 1;
const itemsPerPage = 10;
let deletePendingId = null;
let deletePendingCustomerId = null;
let deletePendingVnum = '';

const user = requireRole('Admin', 'Staff');
if (user) { 
  buildNav(); 
  loadAll(); 
}

async function loadAll() {
  try {
    allCustomers = await API.get('/customers');
    const results = await Promise.allSettled(
      allCustomers.map(c =>
        API.get(`/customers/${c.id}/vehicles`).then(vs =>
          vs.map(v => ({
            ...v,
            customerName: `${c.firstName} ${c.lastName}`,
            customerEmail: c.email,
            customerId: c.id
          }))
        )
      )
    );

    allVehicles = results
      .filter(r => r.status === 'fulfilled')
      .flatMap(r => r.value);

    currentPage = 1;
    renderVehicles(allVehicles);
  } catch (e) {
    document.getElementById('vehBody').innerHTML = `<tr><td colspan="8" class="tbl-empty" style="color:var(--red)">Failed to load vehicles</td></tr>`;
  }
}

function renderVehicles(list) {
  const total = list.length;
  const totalPages = Math.ceil(total / itemsPerPage);
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const paginated = list.slice(start, end);

  document.getElementById('vehCount').textContent = total;
  const body = document.getElementById('vehBody');

  if (!total) {
    body.innerHTML = '<tr><td colspan="8" class="tbl-empty">No vehicles found</td></tr>';
    updatePagination(total, totalPages);
    return;
  }

  body.innerHTML = paginated.map(v => `
    <tr>
      <td><code>${v.vehicleNumber}</code></td>
      <td class="text-strong">${v.make} ${v.model}</td>
      <td class="mono">${v.year}</td>
      <td class="muted">${v.color || '—'}</td>
      <td><span class="badge badge-blue">${v.fuelType}</span></td>
      <td>
        <div class="text-strong" style="font-size:13px">${v.customerName}</div>
        <div class="muted">${v.customerEmail}</div>
      </td>
      <td class="muted">${v.registeredAt ? fmtDate(v.registeredAt) : '—'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="editVehicle(${v.id},${v.customerId})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="showDeleteConfirm(${v.id}, ${v.customerId}, '${v.vehicleNumber}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');

  updatePagination(total, totalPages);
}

function updatePagination(total, totalPages) {
  const info = document.getElementById('vehPaginationInfo');
  const btns = document.getElementById('vehPaginationBtns');
  
  const start = (currentPage - 1) * itemsPerPage + 1;
  const end = Math.min(currentPage * itemsPerPage, total);
  
  info.textContent = total ? `Showing ${start}-${end} of ${total}` : 'No vehicles';

  let html = `<button class="pagination-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>Previous</button>`;
  
  const max = 5;
  let s = Math.max(1, currentPage - Math.floor(max/2));
  let e = Math.min(totalPages, s + max - 1);
  if (e - s < max - 1) s = Math.max(1, e - max + 1);

  for (let i = s; i <= e; i++) {
    html += `<button class="pagination-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
  }
  
  html += `<button class="pagination-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next</button>`;
  btns.innerHTML = html;
}

function changePage(page) {
  const totalPages = Math.ceil(allVehicles.length / itemsPerPage);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderVehicles(allVehicles);
}

function filterVehicles() {
  const q = document.getElementById('vehSearch').value.toLowerCase();
  const fuel = document.getElementById('fuelFilter').value;
  
  const filtered = allVehicles.filter(v =>
    (!fuel || v.fuelType === fuel) &&
    (!q || v.vehicleNumber.toLowerCase().includes(q) ||
           (v.make || '').toLowerCase().includes(q) ||
           (v.model || '').toLowerCase().includes(q) ||
           (v.customerName || '').toLowerCase().includes(q))
  );
  
  currentPage = 1;
  renderVehicles(filtered);
}

// Customer Search in Modal
let searchTimer;
function searchCustomer() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = document.getElementById('custSearchInput').value.trim().toLowerCase();
    const dd = document.getElementById('custDropdown');
    if (!q) { dd.style.display = 'none'; return; }

    const matches = allCustomers.filter(c =>
      `${c.firstName} ${c.lastName} ${c.email} ${c.phone}`.toLowerCase().includes(q)
    ).slice(0, 8);

    if (!matches.length) { dd.style.display = 'none'; return; }

    dd.style.display = 'block';
    dd.innerHTML = matches.map(c => `
      <div class="cust-option" onclick="selectCustomer(${c.id}, '${c.firstName} ${c.lastName}', '${c.email}')">
        <div class="cust-option-name">${c.firstName} ${c.lastName}</div>
        <div class="cust-option-sub">${c.email} • ${c.phone}</div>
      </div>`).join('');
  }, 200);
}

function selectCustomer(id, name, email) {
  document.getElementById('vehCustomerId').value = id;
  document.getElementById('custSearchInput').value = name;
  document.getElementById('custDropdown').style.display = 'none';
  const el = document.getElementById('selectedCust');
  el.style.display = 'block';
  el.textContent = `Selected: ${name} (${email})`;
}

// Edit / Save / Delete
function editVehicle(id, customerId) {
  const v = allVehicles.find(x => x.id === id);
  if (!v) return;
  document.getElementById('vehId').value = id;
  document.getElementById('vehCustomerId').value = customerId;
  document.getElementById('fVNum').value = v.vehicleNumber;
  document.getElementById('fVMake').value = v.make;
  document.getElementById('fVModel').value = v.model;
  document.getElementById('fVYear').value = v.year;
  document.getElementById('fVColor').value = v.color || '';
  document.getElementById('fVFuel').value = v.fuelType;

  document.getElementById('custSearchGroup').style.display = 'none';
  document.getElementById('vehModalTitle').textContent = 'Edit Vehicle';
  document.getElementById('vehSubmitBtn').textContent = 'Update Vehicle';
  openModal('vehModal');
}

function resetVehForm() {
  document.getElementById('vehId').value = '';
  document.getElementById('vehCustomerId').value = '';
  document.getElementById('vehForm').reset();
  document.getElementById('custDropdown').style.display = 'none';
  document.getElementById('selectedCust').style.display = 'none';
  document.getElementById('custSearchGroup').style.display = 'block';
  document.getElementById('vehModalTitle').textContent = 'Add Vehicle';
  document.getElementById('vehSubmitBtn').textContent = 'Add Vehicle';
}

async function saveVehicle(e) {
  e.preventDefault();
  const id = document.getElementById('vehId').value;
  const customerId = document.getElementById('vehCustomerId').value;
  if (!id && !customerId) { notify('Please select a customer first.', 'error'); return; }

  const body = {
    vehicleNumber: document.getElementById('fVNum').value.trim(),
    make: document.getElementById('fVMake').value.trim(),
    model: document.getElementById('fVModel').value.trim(),
    year: parseInt(document.getElementById('fVYear').value),
    color: document.getElementById('fVColor').value.trim(),
    fuelType: document.getElementById('fVFuel').value,
  };

  try {
    if (id) {
      await API.put(`/customers/${customerId}/vehicles/${id}`, body);
      notify('Vehicle updated!', 'success');
    } else {
      await API.post(`/customers/${customerId}/vehicles`, body);
      notify('Vehicle added!', 'success');
    }
    closeModal('vehModal');
    resetVehForm();
    loadAll();
  } catch (err) { notify(err.message, 'error'); }
}

// Custom Delete Modal
function showDeleteConfirm(id, customerId, vnum) {
  deletePendingId = id;
  deletePendingCustomerId = customerId;
  deletePendingVnum = vnum;
  document.getElementById('deleteMessage').innerHTML = `Delete vehicle <strong>${vnum}</strong>?`;
  openModal('deleteConfirmModal');
}

function closeDeleteModal() {
  closeModal('deleteConfirmModal');
  deletePendingId = null;
}

async function confirmDeleteVehicle() {
  if (!deletePendingId || !deletePendingCustomerId) return;
  try {
    await API.del(`/customers/${deletePendingCustomerId}/vehicles/${deletePendingId}`);
    notify('Vehicle deleted successfully', 'success');
    closeDeleteModal();
    loadAll();
  } catch (err) { 
    notify(err.message, 'error'); 
  }
}

document.getElementById('confirmDeleteBtn').onclick = confirmDeleteVehicle;

// Modal backdrop
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { 
    if (e.target === m) { 
      closeModal(m.id); 
      if (m.id === 'vehModal') resetVehForm();
      if (m.id === 'deleteConfirmModal') closeDeleteModal();
    } 
  });
});
</script>
</body>
</html>
