<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.staff-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px; }
.staff-card { background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:all 0.2s;position:relative;overflow:hidden; }
.staff-card::before { content:'';position:absolute;top:0;left:0;right:0;height:2px; }
.staff-card.admin::before { background:var(--accent); }
.staff-card.staff-role::before { background:var(--accent-2); }
.staff-card.inactive { opacity:0.55; }
.staff-avatar { width:52px;height:52px;border-radius:50%;background:var(--bg-3);border:2px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;margin-bottom:14px; }
.staff-avatar.admin { border-color:var(--accent);color:var(--accent); }
.staff-avatar.staff-role { border-color:var(--accent-2);color:var(--accent-2); }
.staff-name { font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;margin-bottom:2px; }
.staff-email { font-size:12px;color:var(--text-3);margin-bottom:14px; }
.staff-meta { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px; }
.role-badge { font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:1px; }
.role-badge.admin { background:var(--accent-dim);color:var(--accent); }
.role-badge.staff-role { background:var(--accent-2-dim);color:var(--accent-2); }
.staff-actions { display:flex;gap:6px;border-top:1px solid var(--border);padding-top:16px;flex-wrap:wrap; }
.stats-mini { display:flex;gap:4px;margin-bottom:0;margin-top:auto; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-icon">⚙</span>
    <span class="brand-name">VehicleParts<span class="brand-accent">Pro</span></span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html" class="nav-link">Dashboard</a></li>
    <li><a href="parts.html" class="nav-link">Parts</a></li>
    <li><a href="customers.html" class="nav-link">Customers</a></li>
    <li><a href="sales.html" class="nav-link">Sales</a></li>
    <li><a href="purchases.html" class="nav-link">Purchases</a></li>
    <li><a href="vendors.html" class="nav-link">Vendors</a></li>
    <li><a href="staff.html" class="nav-link active">Staff</a></li>
  </ul>
</nav>

<main class="main-content">
  <header class="page-header">
    <div class="header-top">
      <div><p class="page-label"></p><h1 class="page-title">Admin and Staff Management</h1></div>
      <button class="btn btn-primary" onclick="openModal('staffModal')">+ Add Staff</button>
    </div>
  </header>

  <!-- Mini stats -->
  <div style="display:flex;gap:12px;margin-bottom:24px" id="staffStats">
    <div class="stat-card" style="flex:1;padding:16px 20px">
      <div class="stat-label">Total Staff</div><div class="stat-value" id="sTotalStaff">—</div>
    </div>
    <div class="stat-card" style="flex:1;padding:16px 20px">
      <div class="stat-label">Active</div><div class="stat-value" style="color:var(--success)" id="sActiveStaff">—</div>
    </div>
    <div class="stat-card" style="flex:1;padding:16px 20px">
      <div class="stat-label">Inactive</div><div class="stat-value" style="color:var(--text-3)" id="sInactiveStaff">—</div>
    </div>
  </div>

  <div class="controls-bar" style="margin-bottom:20px">
    <select class="select-input" id="roleFilter" onchange="filterStaff()">
      <option value="">All Roles</option><option>Admin</option><option>Staff</option>
    </select>
    <select class="select-input" id="activeFilter" onchange="filterStaff()">
      <option value="">All Status</option><option value="true">Active</option><option value="false">Inactive</option>
    </select>
  </div>

  <div class="staff-grid" id="staffGrid">
    <div style="padding:48px;text-align:center;color:var(--text-3)">Loading…</div>
  </div>
</main>

<!-- ADD STAFF MODAL -->
<div class="modal-overlay" id="staffModal">
  <div class="modal">
    <h2 class="modal-title" id="staffModalTitle">Add Staff Member</h2>
    <form id="staffForm" onsubmit="saveStaff(event)">
      <input type="hidden" id="staffId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name *</label>
          <input class="form-input" id="fSFirstName" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name *</label>
          <input class="form-input" id="fSLastName" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input class="form-input" id="fSEmail" type="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Phone *</label>
        <input class="form-input" id="fSPhone" required>
      </div>
      <div class="form-group" id="staffRoleGroup">
        <label class="form-label">Role *</label>
        <select class="form-select" id="fSRole" required>
          <option value="Staff">Staff</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
      <div class="form-group" id="staffPasswordGroup">
        <label class="form-label">Password *</label>
        <input class="form-input" id="fSPassword" type="password" placeholder="Min 6 characters">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('staffModal');resetStaffForm()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="staffSubmitBtn">Add Staff</button>
      </div>
    </form>
  </div>
</div>

<script src="api.js"></script>
<script>
let allStaff = [];

async function loadStaff() {
  try {
    allStaff = await API.get('/staff');
    renderStaff(allStaff);
    loadStaffCount();
  } catch (e) {
    document.getElementById('staffGrid').innerHTML = '<div class="table-empty error">Failed to load staff</div>';
  }
}

async function loadStaffCount() {
  try {
    const c = await API.get('/staff/count');
    document.getElementById('sTotalStaff').textContent = c.totalStaff;
    document.getElementById('sActiveStaff').textContent = c.activeStaff;
    document.getElementById('sInactiveStaff').textContent = c.inactiveStaff;
  } catch (_) {}
}

function renderStaff(list) {
  const grid = document.getElementById('staffGrid');
  if (!list.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:48px;text-align:center;color:var(--text-3);font-family:\'JetBrains Mono\',monospace;font-size:13px">No staff members found</div>';
    return;
  }
  grid.innerHTML = list.map(s => {
    const roleClass = s.role === 'Admin' ? 'admin' : 'staff-role';
    const initials = `${s.firstName[0]}${s.lastName[0]}`;
    return `
    <div class="staff-card ${roleClass} ${!s.isActive ? 'inactive' : ''}">
      <div class="staff-avatar ${roleClass}">${initials}</div>
      <div class="staff-name">${s.firstName} ${s.lastName}</div>
      <div class="staff-email">${s.email}</div>
      <div class="staff-meta">
        <span class="role-badge ${roleClass}">${s.role.toUpperCase()}</span>
        <span class="status-badge ${s.isActive ? 'active' : 'inactive'}">${s.isActive ? 'Active' : 'Inactive'}</span>
      </div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:16px;font-family:'JetBrains Mono',monospace">${s.phone}</div>
      <div class="staff-actions">
        <button class="btn btn-outline btn-sm" onclick="editStaff(${s.id})">Edit</button>
        <button class="btn btn-outline btn-sm" onclick="changeRole(${s.id},'${s.role}','${s.firstName}')">Role</button>
        <button class="btn ${s.isActive ? 'btn-danger' : 'btn-outline'} btn-sm" onclick="toggleStatus(${s.id},${s.isActive},'${s.firstName}')">
          ${s.isActive ? 'Deactivate' : 'Activate'}
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteStaff(${s.id},'${s.firstName}')">Del</button>
      </div>
    </div>`;
  }).join('');
}

function filterStaff() {
  const r = document.getElementById('roleFilter').value;
  const a = document.getElementById('activeFilter').value;
  renderStaff(allStaff.filter(s =>
    (!r || s.role === r) &&
    (a === '' || String(s.isActive) === a)
  ));
}

function editStaff(id) {
  const s = allStaff.find(x => x.id === id);
  if (!s) return;
  document.getElementById('staffId').value = s.id;
  document.getElementById('fSFirstName').value = s.firstName;
  document.getElementById('fSLastName').value = s.lastName;
  document.getElementById('fSEmail').value = s.email;
  document.getElementById('fSPhone').value = s.phone;
  document.getElementById('staffRoleGroup').style.display = 'none';
  document.getElementById('staffPasswordGroup').style.display = 'none';
  document.getElementById('staffModalTitle').textContent = 'Edit Staff';
  document.getElementById('staffSubmitBtn').textContent = 'Update';
  openModal('staffModal');
}

async function changeRole(id, currentRole, name) {
  const newRole = currentRole === 'Admin' ? 'Staff' : 'Admin';
  if (!confirm(`Change ${name}'s role from ${currentRole} to ${newRole}?`)) return;
  try {
    await API.patch(`/staff/${id}/role`, { role: newRole });
    notify(`Role changed to ${newRole}`, 'success');
    loadStaff();
  } catch (err) { notify(err.message, 'error'); }
}

async function toggleStatus(id, isActive, name) {
  const action = isActive ? 'deactivate' : 'activate';
  if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} ${name}?`)) return;
  try {
    await API.patch(`/staff/${id}/status`, { isActive: !isActive });
    notify(`Staff ${action}d`, 'success');
    loadStaff();
  } catch (err) { notify(err.message, 'error'); }
}

async function deleteStaff(id, name) {
  if (!confirm(`Permanently delete "${name}"?`)) return;
  try {
    await API.del(`/staff/${id}`);
    notify('Staff deleted', 'success');
    loadStaff();
  } catch (err) { notify(err.message, 'error'); }
}

function resetStaffForm() {
  document.getElementById('staffId').value = '';
  document.getElementById('staffForm').reset();
  document.getElementById('staffRoleGroup').style.display = '';
  document.getElementById('staffPasswordGroup').style.display = '';
  document.getElementById('staffModalTitle').textContent = 'Add Staff Member';
  document.getElementById('staffSubmitBtn').textContent = 'Add Staff';
}

async function saveStaff(e) {
  e.preventDefault();
  const id = document.getElementById('staffId').value;
  try {
    if (id) {
      await API.put(`/staff/${id}`, {
        firstName: document.getElementById('fSFirstName').value,
        lastName: document.getElementById('fSLastName').value,
        email: document.getElementById('fSEmail').value,
        phone: document.getElementById('fSPhone').value,
      });
      notify('Staff updated!', 'success');
    } else {
      await API.post('/staff', {
        firstName: document.getElementById('fSFirstName').value,
        lastName: document.getElementById('fSLastName').value,
        email: document.getElementById('fSEmail').value,
        phone: document.getElementById('fSPhone').value,
        role: document.getElementById('fSRole').value,
        password: document.getElementById('fSPassword').value,
      });
      notify('Staff added!', 'success');
    }
    closeModal('staffModal'); resetStaffForm(); loadStaff();
  } catch (err) { notify(err.message, 'error'); }
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) { closeModal(m.id); resetStaffForm(); } });
});

loadStaff();
</script>
</body>
</html>
