<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
<style>
.staff-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
  gap: 16px; 
}

.staff-card { 
  background: var(--surface); 
  border: 1px solid var(--border); 
  border-radius: var(--radius-lg); 
  padding: 24px; 
  transition: all 0.2s; 
  position: relative; 
  overflow: hidden; 
}

.staff-card::before { 
  content: ''; 
  position: absolute; 
  top: 0; 
  left: 0; 
  right: 0; 
  height: 2px; 
}

.staff-card.admin::before { background: var(--blue); }
.staff-card.staff-role::before { background: var(--amber); }
.staff-card.inactive { opacity: 0.55; }

.staff-avatar { 
  width: 52px; 
  height: 52px; 
  border-radius: 50%; 
  background: var(--bg); 
  border: 2px solid var(--border-2); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-family: 'Syne', sans-serif; 
  font-size: 20px; 
  font-weight: 700; 
  margin-bottom: 14px; 
}

.staff-avatar.admin { border-color: var(--blue); color: var(--blue); }
.staff-avatar.staff-role { border-color: var(--amber); color: var(--amber); }

.staff-name { 
  font-family: 'Syne', sans-serif; 
  font-weight: 700; 
  font-size: 20px; 
  margin-bottom: 2px; 
  color: var(--text); 
}

.staff-email { 
  font-size: 13px; 
  color: var(--text-3); 
  margin-bottom: 14px; 
}

.staff-meta { 
  display: flex; 
  gap: 8px; 
  flex-wrap: wrap; 
  margin-bottom: 16px; 
}

.staff-actions { 
  display: flex; 
  gap: 6px; 
  border-top: 1px solid var(--border); 
  padding-top: 16px; 
  flex-wrap: wrap; 
}

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 24px;
  flex-wrap: wrap;
  gap: 10px;
}
.pagination-info { color: var(--text-3); font-size: 14px; }
.pagination-btns { display: flex; gap: 6px; }
.pagination-btn {
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--bg);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.pagination-btn:hover { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.pagination-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-name">VehicleParts Pro</span>
  </a>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="main">
  <div class="page-hd">
    <div class="page-hd-left">
      <div class="page-eyebrow">Administration</div>
      <h1 class="page-title">Staff Management</h1>
    </div>
    <button class="btn btn-primary" onclick="openModal('staffModal')">+ Add Staff</button>
  </div>

  <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat"><div class="stat-label">Total Staff</div><div class="stat-value" id="sTotalStaff">—</div></div>
    <div class="stat stat--green"><div class="stat-label">Active</div><div class="stat-value" id="sActiveStaff">—</div></div>
    <div class="stat"><div class="stat-label">Inactive</div><div class="stat-value" id="sInactiveStaff">—</div></div>
  </div>

  <div class="controls" style="margin-bottom:20px">
    <select class="select-filter" id="roleFilter" onchange="filterStaff()">
      <option value="">All Roles</option>
      <option>Admin</option>
      <option>Staff</option>
    </select>
    <select class="select-filter" id="activeFilter" onchange="filterStaff()">
      <option value="">All Status</option>
      <option value="true">Active</option>
      <option value="false">Inactive</option>
    </select>
  </div>

  <div class="staff-grid" id="staffGrid">
    <div style="padding:48px;text-align:center;color:var(--text-3)">Loading...</div>
  </div>

  <div class="pagination" id="pagination">
    <div class="pagination-info" id="paginationInfo">Showing 1-6 of 0</div>
    <div class="pagination-btns" id="paginationBtns"></div>
  </div>
</main>

<!-- Add/Edit Staff Modal -->
<div class="modal-overlay" id="staffModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="staffModalTitle">Add Staff Member</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('staffModal');resetStaffForm()">Close</button>
    </div>
    <form id="staffForm" onsubmit="saveStaff(event)">
      <input type="hidden" id="staffId">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name</label><input class="input" id="fSFirstName" required></div>
        <div class="form-group"><label class="form-label">Last Name</label><input class="input" id="fSLastName" required></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="input" id="fSEmail" type="email" required></div>
      <div class="form-group"><label class="form-label">Phone</label><input class="input" id="fSPhone" required></div>
      <div class="form-group" id="staffRoleGroup">
        <label class="form-label">Role</label>
        <select class="input select" id="fSRole">
          <option value="Staff">Staff</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
      <div class="form-group" id="staffPasswordGroup">
        <label class="form-label">Password</label>
        <input class="input" id="fSPassword" type="password" placeholder="Min 6 characters">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('staffModal');resetStaffForm()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="staffSubmitBtn">Add Staff</button>
      </div>
    </form>
  </div>
</div>

<!-- Custom Confirmation Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="confirmTitle">Confirm Action</div>
    </div>
    <div style="padding:25px 30px; text-align:center;">
      <div id="confirmIcon" style="font-size:42px; margin-bottom:12px;"></div>
      <p style="font-size:15.5px; margin:10px 0 20px;" id="confirmMessage"></p>
    </div>
    <div class="form-actions" style="padding:15px 30px 25px;">
      <button class="btn btn-outline" onclick="closeConfirmModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmActionBtn">Confirm</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
let allStaff = [];
let currentPage = 1;
const itemsPerPage = 6;

const user = requireRole('Admin');
if (user) {
  buildNav();
  loadStaff();
}

async function loadStaff() {
  try {
    allStaff = await API.get('/staff');
    currentPage = 1;
    renderStaff(allStaff);

    try {
      const c = await API.get('/staff/count');
      document.getElementById('sTotalStaff').textContent = c.totalStaff || 0;
      document.getElementById('sActiveStaff').textContent = c.activeStaff || 0;
      document.getElementById('sInactiveStaff').textContent = c.inactiveStaff || 0;
    } catch (_) {
      document.getElementById('sTotalStaff').textContent = allStaff.length;
      document.getElementById('sActiveStaff').textContent = allStaff.filter(s => s.isActive).length;
      document.getElementById('sInactiveStaff').textContent = allStaff.filter(s => !s.isActive).length;
    }
  } catch (e) {
    document.getElementById('staffGrid').innerHTML = `<div style="color:#ff6b6b;padding:40px;text-align:center;border:1px solid #ff6b6b33;border-radius:12px">Failed to load staff</div>`;
  }
}

function renderStaff(list) {
  const grid = document.getElementById('staffGrid');
  const total = list.length;
  const totalPages = Math.ceil(total / itemsPerPage);
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const paginated = list.slice(start, end);

  if (!total) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:48px;text-align:center;color:var(--text-3)">No staff members found</div>';
    updatePagination(0, 0);
    return;
  }

  grid.innerHTML = paginated.map(s => {
    const roleClass = s.role === 'Admin' ? 'admin' : 'staff-role';
    const initials = `${(s.firstName || '')[0]}${(s.lastName || '')[0]}`.toUpperCase();

    return `
    <div class="staff-card ${roleClass} ${!s.isActive ? 'inactive' : ''}">
      <div class="staff-avatar ${roleClass}">${initials}</div>
      <div class="staff-name">${s.firstName} ${s.lastName}</div>
      <div class="staff-email">${s.email}</div>
      <div class="staff-meta">
        <span class="badge ${s.role === 'Admin' ? 'badge-blue' : 'badge-amber'}">${s.role}</span>
        <span class="badge ${s.isActive ? 'badge-green' : 'badge-gray'}">${s.isActive ? 'Active' : 'Inactive'}</span>
      </div>
      <div class="muted" style="margin-bottom:16px;font-family:'Space Mono',monospace;font-size:12px">${s.phone || '—'}</div>
      <div class="staff-actions">
        <button class="btn btn-outline btn-sm" onclick="editStaff(${s.id})">Edit</button>
        <button class="btn btn-outline btn-sm" onclick="showRoleConfirm(${s.id},'${s.role}','${s.firstName}')">Change Role</button>
        <button class="btn ${s.isActive ? 'btn-danger' : 'btn-outline'} btn-sm" onclick="showStatusConfirm(${s.id},${!!s.isActive},'${s.firstName}')">
          ${s.isActive ? 'Deactivate' : 'Activate'}
        </button>
        <button class="btn btn-danger btn-sm" onclick="showDeleteConfirm(${s.id},'${s.firstName} ${s.lastName}')">Delete</button>
      </div>
    </div>`;
  }).join('');

  updatePagination(total, totalPages);
}

function updatePagination(total, totalPages) {
  const info = document.getElementById('paginationInfo');
  const btns = document.getElementById('paginationBtns');
  
  const start = (currentPage - 1) * itemsPerPage + 1;
  const end = Math.min(currentPage * itemsPerPage, total);
  
  info.textContent = total ? `Showing ${start}-${end} of ${total}` : 'No staff';

  let html = `<button class="pagination-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>Previous</button>`;
  
  const max = 5;
  let s = Math.max(1, currentPage - Math.floor(max/2));
  let e = Math.min(totalPages, s + max - 1);
  if (e - s < max - 1) s = Math.max(1, e - max + 1);

  for (let i = s; i <= e; i++) {
    html += `<button class="pagination-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
  }
  
  html += `<button class="pagination-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next</button>`;
  btns.innerHTML = html;
}

function changePage(page) {
  if (page < 1 || page > Math.ceil(allStaff.length / itemsPerPage)) return;
  currentPage = page;
  renderStaff(allStaff);
}

function filterStaff() {
  const r = document.getElementById('roleFilter').value;
  const a = document.getElementById('activeFilter').value;
  const filtered = allStaff.filter(s => 
    (!r || s.role === r) && (a === '' || String(s.isActive) === a)
  );
  currentPage = 1;
  renderStaff(filtered);
}

// ==================== FIXED CONFIRMATION SYSTEM ====================
function showConfirm(title, message, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').innerHTML = message;
  document.getElementById('confirmIcon').innerHTML = '';
  
  // Important: Re-attach the click handler every time
  const confirmBtn = document.getElementById('confirmActionBtn');
  confirmBtn.onclick = () => {
    closeConfirmModal();
    if (callback) callback();
  };
  
  openModal('confirmModal');
}

function closeConfirmModal() {
  closeModal('confirmModal');
}

function showDeleteConfirm(id, name) {
  showConfirm("Delete Staff", `Are you sure you want to permanently delete <strong>${name}</strong>?`, () => deleteStaffConfirmed(id));
}

async function deleteStaffConfirmed(id) {
  try {
    await API.del(`/staff/${id}`);
    notify('Staff member deleted', 'success');
    loadStaff();
  } catch (err) {
    notify(err.message || 'Failed to delete staff', 'error');
  }
}

function showRoleConfirm(id, currentRole, name) {
  const newRole = currentRole === 'Admin' ? 'Staff' : 'Admin';
  showConfirm("Change Role", `Change <strong>${name}</strong>'s role from <strong>${currentRole}</strong> to <strong>${newRole}</strong>?`, () => changeRoleConfirmed(id, newRole));
}

async function changeRoleConfirmed(id, newRole) {
  try {
    await API.patch(`/staff/${id}/role`, { role: newRole });
    notify(`Role changed to ${newRole}`, 'success');
    loadStaff();
  } catch (err) {
    notify(err.message || 'Failed to change role', 'error');
  }
}

function showStatusConfirm(id, isActive, name) {
  const action = isActive ? 'Deactivate' : 'Activate';
  showConfirm(
    action + " Staff", 
    `${action} <strong>${name}</strong>?`, 
    () => toggleStatusConfirmed(id, isActive)
  );
}

async function toggleStatusConfirmed(id, isActive) {
  try {
    await API.patch(`/staff/${id}/status`, { isActive: !isActive });
    notify(`Staff ${isActive ? 'deactivated' : 'activated'}`, 'success');
    loadStaff();
  } catch (err) {
    notify(err.message || 'Failed to update status', 'error');
  }
}

// Edit & Save
function editStaff(id) {
  const s = allStaff.find(x => x.id === id);
  if (!s) return;

  document.getElementById('staffId').value = s.id;
  document.getElementById('fSFirstName').value = s.firstName;
  document.getElementById('fSLastName').value = s.lastName;
  document.getElementById('fSEmail').value = s.email;
  document.getElementById('fSPhone').value = s.phone;

  document.getElementById('staffRoleGroup').style.display = 'none';
  document.getElementById('staffPasswordGroup').style.display = 'none';
  document.getElementById('staffModalTitle').textContent = 'Edit Staff';
  document.getElementById('staffSubmitBtn').textContent = 'Update';

  openModal('staffModal');
}

function resetStaffForm() {
  document.getElementById('staffId').value = '';
  document.getElementById('staffForm').reset();
  document.getElementById('staffRoleGroup').style.display = '';
  document.getElementById('staffPasswordGroup').style.display = '';
  document.getElementById('staffModalTitle').textContent = 'Add Staff Member';
  document.getElementById('staffSubmitBtn').textContent = 'Add Staff';
}

async function saveStaff(e) {
  e.preventDefault();
  const id = document.getElementById('staffId').value;
  try {
    if (id) {
      await API.put(`/staff/${id}`, {
        firstName: document.getElementById('fSFirstName').value,
        lastName: document.getElementById('fSLastName').value,
        email: document.getElementById('fSEmail').value,
        phone: document.getElementById('fSPhone').value,
      });
      notify('Staff updated successfully', 'success');
    } else {
      await API.post('/staff', {
        firstName: document.getElementById('fSFirstName').value,
        lastName: document.getElementById('fSLastName').value,
        email: document.getElementById('fSEmail').value,
        phone: document.getElementById('fSPhone').value,
        role: document.getElementById('fSRole').value,
        password: document.getElementById('fSPassword').value,
      });
      notify('Staff added successfully', 'success');
    }
    closeModal('staffModal');
    resetStaffForm();
    loadStaff();
  } catch (err) {
    notify(err.message || 'Save failed', 'error');
  }
}

// Modal Backdrop
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) {
      closeModal(m.id);
      if (m.id === 'staffModal') resetStaffForm();
    }
  });
});
</script>
</body>
</html>
