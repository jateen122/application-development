<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Sales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
<style>
.sale-items { display:flex; flex-direction:column; gap:8px; }
.sale-item-row { display:grid; grid-template-columns:1fr 80px auto; gap:8px; align-items:end; }
.sale-item-row .form-group { margin-bottom:0; }
.remove-btn { background:none; border:none; color:var(--red); cursor:pointer; font-size:20px; padding:8px; line-height:1; transition:opacity 0.15s; }
.remove-btn:hover { opacity:0.7; }
.add-line-btn { width:100%; padding:9px; background:none; border:1px dashed var(--border-2); border-radius:var(--radius); color:var(--text-3); font-size:13px; cursor:pointer; transition:all 0.15s; margin-top:6px; }
.add-line-btn:hover { border-color:var(--blue); color:var(--blue); }

.totals-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-top:14px; display:none; }
.total-line { display:flex; justify-content:space-between; padding:5px 0; font-size:13.5px; color:var(--text-2); }
.total-line.final { border-top:1px solid var(--border); margin-top:6px; padding-top:10px; font-size:17px; font-weight:700; color:var(--blue); }
.discount-line { color:var(--green); font-size:13px; }

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.pagination-info {
  color: var(--text-3);
  font-size: 14px;
}
.pagination-btns {
  display: flex;
  gap: 6px;
}
.pagination-btn {
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--bg);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.pagination-btn:hover {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}
.pagination-btn.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-name">VehicleParts Pro</span>
  </a>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="main">
  <div class="page-hd">
    <div class="page-hd-left">
      <div class="page-eyebrow">Billing</div>
      <h1 class="page-title">Sales Invoices</h1>
    </div>
    <button class="btn btn-primary" onclick="openModal('saleModal')">+ New Sale</button>
  </div>

  <div class="card">
    <div class="controls">
      <select class="select-filter" id="statusFilter" onchange="filterSales()">
        <option value="">All Statuses</option>
        <option>Paid</option><option>Credit</option><option>Cancelled</option>
      </select>
      <span class="muted" style="margin-left:auto"><span id="saleCount">—</span> invoices</span>
    </div>
    <div class="table-wrap">
      <table class="tbl">
        <thead>
          <tr><th>Invoice #</th><th>Date</th><th>Subtotal</th><th>Discount</th><th>Total</th><th>Payment</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="salesBody"><tr><td colspan="8" class="tbl-empty">Loading…</td></tr></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination">
      <div class="pagination-info" id="paginationInfo">Showing 1-10 of 0</div>
      <div class="pagination-btns" id="paginationBtns"></div>
    </div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="saleDetailModal">
  <div class="modal modal--wide">
    <div class="modal-hd">
      <div class="modal-title" id="saleDetailTitle">Invoice</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" id="emailInvBtn" onclick="emailInvoice()">📧 Email</button>
        <button class="btn btn-outline btn-sm" onclick="closeModal('saleDetailModal')">Close</button>
      </div>
    </div>
    <div id="saleDetailContent">Loading…</div>
    <div style="margin-top:14px;display:flex;gap:10px" id="saleStatusActions"></div>
  </div>
</div>

<!-- NEW SALE MODAL -->
<div class="modal-overlay" id="saleModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">New Sale Invoice</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('saleModal');resetSaleForm()">Close</button>
    </div>
    <form id="saleForm" onsubmit="createSale(event)">
      <div class="form-group">
        <label class="form-label">Customer *</label>
        <select class="input select" id="fSaleCust" required>
          <option value="">Select customer…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Payment Method *</label>
        <select class="input select" id="fSalePay" required>
          <option value="">Select…</option>
          <option>Cash</option><option>Card</option><option>Credit</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Items</label>
        <div class="sale-items" id="saleItemsList"></div>
        <button type="button" class="add-line-btn" onclick="addSaleItem()">+ Add Item</button>
      </div>
      <div class="totals-box" id="saleTotals">
        <div class="total-line"><span>Subtotal</span><span id="tSub">—</span></div>
        <div class="total-line discount-line" id="discountLine" style="display:none">
          <span>Loyalty Discount (10%)</span><span id="tDiscount">—</span>
        </div>
        <div class="total-line final"><span>Total</span><span id="tTotal">—</span></div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-outline" onclick="closeModal('saleModal');resetSaleForm()">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Invoice</button>
      </div>
    </form>
  </div>
</div>

<script src="auth.js"></script>
<script>
const user = requireRole('Admin', 'Staff');
if (user) { buildNav(); init(); }

let allSales = [], allParts = [], allCustomers = [];
let itemIdx = 0;
let currentInvoiceId = null;
let currentPage = 1;
const itemsPerPage = 10;

async function init() {
  try {
    [allSales, allParts, allCustomers] = await Promise.all([
      API.get('/sales'), API.get('/parts'), API.get('/customers')
    ]);
    renderSales(allSales);
    populateCustomers();
  } catch(e) {
    document.getElementById('salesBody').innerHTML = '<tr><td colspan="8" class="tbl-empty">Failed to load.</td></tr>';
  }
}

function populateCustomers() {
  const select = document.getElementById('fSaleCust');
  allCustomers.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = `${c.firstName} ${c.lastName}`;
    select.appendChild(o);
  });
}

function renderSales(list) {
  const total = list.length;
  const totalPages = Math.ceil(total / itemsPerPage);
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const paginated = list.slice(start, end);

  document.getElementById('saleCount').textContent = total;

  const body = document.getElementById('salesBody');
  if (!total) {
    body.innerHTML = '<tr><td colspan="8" class="tbl-empty">No invoices yet</td></tr>';
    updatePagination(0, 0);
    return;
  }

  body.innerHTML = paginated.map(s => `
    <tr>
      <td><code>${s.invoiceNumber}</code></td>
      <td class="muted">${fmtDate(s.invoiceDate)}</td>
      <td class="amount">—</td>
      <td>${s.loyaltyDiscountApplied ? '<span class="text-green" style="font-size:12px">-10%</span>' : '—'}</td>
      <td class="amount text-blue">NPR ${fmt(s.totalAmount)}</td>
      <td class="muted">${s.paymentMethod}</td>
      <td><span class="status status-${s.status.toLowerCase()}">${s.status}</span></td>
      <td><button class="btn btn-outline btn-sm" onclick="viewSale(${s.id})">View</button></td>
    </tr>`).join('');

  updatePagination(total, totalPages);
}

function updatePagination(total, totalPages) {
  const info = document.getElementById('paginationInfo');
  const btnsContainer = document.getElementById('paginationBtns');
  
  const start = (currentPage - 1) * itemsPerPage + 1;
  const end = Math.min(currentPage * itemsPerPage, total);
  
  info.textContent = total ? `Showing ${start}-${end} of ${total}` : 'No invoices';

  let btnHTML = `
    <button class="pagination-btn" onclick="changePage(${currentPage-1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>`;

  const maxVisible = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisible/2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  
  if (endPage - startPage < maxVisible - 1) {
    startPage = Math.max(1, endPage - maxVisible + 1);
  }

  for (let i = startPage; i <= endPage; i++) {
    btnHTML += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }

  btnHTML += `<button class="pagination-btn" onclick="changePage(${currentPage+1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;
  
  btnsContainer.innerHTML = btnHTML;
}

function changePage(page) {
  const totalPages = Math.ceil(allSales.length / itemsPerPage);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderSales(allSales);   // Use current filter state
}

function filterSales() {
  const status = document.getElementById('statusFilter').value;
  const filtered = status ? allSales.filter(x => x.status === status) : allSales;
  currentPage = 1;
  renderSales(filtered);
}

// Rest of the functions remain the same
async function viewSale(id) {
  currentInvoiceId = id;
  try {
    const s = await API.get(`/sales/${id}`);
    document.getElementById('saleDetailTitle').textContent = s.invoiceNumber;
    document.getElementById('saleDetailContent').innerHTML = `
      <div class="grid-2" style="margin-bottom:20px;gap:12px;font-size:13px">
        <div><div class="form-label">Customer</div><a href="customer-detail.html?id=${s.customer.id}" class="link">${s.customer.firstName} ${s.customer.lastName}</a></div>
        <div><div class="form-label">Date</div><div>${fmtDateTime(s.invoiceDate)}</div></div>
        <div><div class="form-label">Payment</div><div>${s.paymentMethod}</div></div>
        <div><div class="form-label">Status</div><span class="status status-${s.status.toLowerCase()}">${s.status}</span></div>
      </div>
      <table class="tbl" style="margin-bottom:16px">
        <thead><tr><th>Part</th><th>Part #</th><th>Qty</th><th>Unit Price</th><th>Line Total</th></tr></thead>
        <tbody>${s.items.map(i => `<tr>
          <td class="text-strong">${i.partName}</td>
          <td><code>${i.partNumber}</code></td>
          <td class="mono">${i.quantity}</td>
          <td class="amount">NPR ${fmt(i.unitPrice)}</td>
          <td class="amount">NPR ${fmt(i.lineTotal)}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div style="background:var(--bg);border-radius:var(--radius);padding:14px;text-align:right;font-size:13px">
        <div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--text-2)"><span>Subtotal</span><span class="amount">NPR ${fmt(s.subTotal)}</span></div>
        ${s.loyaltyDiscountApplied ? `<div style="display:flex;justify-content:space-between;padding:4px 0;color:var(--green)"><span>Loyalty Discount (10%)</span><span>-NPR ${fmt(s.discountAmount)}</span></div>` : ''}
        <div style="display:flex;justify-content:space-between;padding:10px 0 0;font-size:18px;font-weight:700;color:var(--blue);font-family:'Syne',sans-serif;border-top:1px solid var(--border);margin-top:6px">
          <span>TOTAL</span><span>NPR ${fmt(s.totalAmount)}</span>
        </div>
      </div>`;

    const acts = document.getElementById('saleStatusActions');
    acts.innerHTML = '';
    if (s.status === 'Credit') {
      const b = document.createElement('button');
      b.className = 'btn btn-primary btn-sm';
      b.textContent = '✓ Mark as Paid';
      b.onclick = () => changeStatus(id, 'Paid');
      acts.appendChild(b);
    }
    if (s.status !== 'Cancelled') {
      const b2 = document.createElement('button');
      b2.className = 'btn btn-danger btn-sm';
      b2.textContent = 'Cancel Invoice';
      b2.onclick = () => changeStatus(id, 'Cancelled');
      acts.appendChild(b2);
    }

    openModal('saleDetailModal');
  } catch(e) { notify('Failed to load invoice', 'error'); }
}

async function emailInvoice() {
  if (!currentInvoiceId) return;
  try {
    const res = await API.post(`/sales/${currentInvoiceId}/send-email`, {});
    notify(res?.message || 'Invoice emailed!', 'success');
  } catch(err) { notify(err.message, 'error'); }
}

async function changeStatus(id, status) {
  if (!confirm(`${status === 'Cancelled' ? 'Cancel' : 'Mark as paid'} this invoice?`)) return;
  try {
    await API.patch(`/sales/${id}/status`, { status });
    notify(`Invoice marked as ${status}`, 'success');
    closeModal('saleDetailModal');
    allSales = await API.get('/sales');
    currentPage = 1;
    renderSales(allSales);
  } catch(err) { notify(err.message, 'error'); }
}

// Sale Form Functions (unchanged)
function addSaleItem() { /* ... same as before ... */
  itemIdx++;
  const idx  = itemIdx;
  const list = document.getElementById('saleItemsList');
  const row  = document.createElement('div');
  row.className = 'sale-item-row';
  row.id = `sItem${idx}`;
  row.innerHTML = `
    <div class="form-group">
      <label class="form-label">Part</label>
      <select class="input select" id="iPart${idx}" onchange="calcTotals()" required>
        <option value="">Select part…</option>
        ${allParts.map(p => `<option value="${p.id}" data-price="${p.sellingPrice}" data-stock="${p.stockQty}">${p.name} — Stock: ${p.stockQty}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Qty</label>
      <input class="input" id="iQty${idx}" type="number" min="1" value="1" onchange="calcTotals()" required>
    </div>
    <button type="button" class="remove-btn" onclick="document.getElementById('sItem${idx}').remove();calcTotals()">&times;</button>`;
  list.appendChild(row);
  calcTotals();
}

function calcTotals() {
  let sub = 0; let hasItems = false;
  document.querySelectorAll('.sale-item-row').forEach(row => {
    const sel = row.querySelector('select');
    const qty = row.querySelector('input[type="number"]');
    if (!sel || !qty) return;
    const opt = sel.options[sel.selectedIndex];
    if (opt && opt.value) {
      hasItems = true;
      sub += parseFloat(opt.dataset.price || 0) * (parseInt(qty.value) || 0);
    }
  });
  const loyalty  = sub > 5000;
  const discount = loyalty ? sub * 0.10 : 0;
  const total    = sub - discount;
  document.getElementById('saleTotals').style.display        = hasItems ? 'block' : 'none';
  document.getElementById('tSub').textContent                = `NPR ${fmt(sub)}`;
  document.getElementById('discountLine').style.display      = loyalty ? 'flex' : 'none';
  document.getElementById('tDiscount').textContent           = `-NPR ${fmt(discount)}`;
  document.getElementById('tTotal').textContent              = `NPR ${fmt(total)}`;
}

async function createSale(e) {
  e.preventDefault();
  const items = [];
  document.querySelectorAll('.sale-item-row').forEach(row => {
    const sel = row.querySelector('select');
    const qty = row.querySelector('input[type="number"]');
    if (sel && sel.value && qty) items.push({ partId:parseInt(sel.value), quantity:parseInt(qty.value) });
  });
  if (!items.length) { notify('Add at least one item', 'error'); return; }
  const body = {
    customerId:    parseInt(document.getElementById('fSaleCust').value),
    paymentMethod: document.getElementById('fSalePay').value,
    items,
  };
  try {
    await API.post('/sales', body);
    notify('Invoice created! Email sent to customer.', 'success');
    closeModal('saleModal'); resetSaleForm();
    allSales = await API.get('/sales');
    currentPage = 1;
    renderSales(allSales);
    allParts = await API.get('/parts');
  } catch(err) { notify(err.message, 'error'); }
}

function resetSaleForm() {
  document.getElementById('saleForm').reset();
  document.getElementById('saleItemsList').innerHTML = '';
  document.getElementById('saleTotals').style.display = 'none';
  itemIdx = 0;
}

// Modal backdrop
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
});
</script>
</body>
</html>
