<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleParts Pro — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
  padding: 24px;
}

.login-wrap {
  width: 100%;
  max-width: 400px;
}

.login-brand {
  text-align: center;
  margin-bottom: 32px;
}

.login-brand-icon {
  width: 44px;
  height: 44px;
  background: var(--blue);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 22px;
  color: #fff;
}

.login-brand-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.3px;
}

.login-brand-name span { color: var(--blue); }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 32px;
  box-shadow: var(--shadow);
}

.login-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 4px;
}

.login-sub {
  font-size: 13.5px;
  color: var(--text-3);
  margin-bottom: 24px;
}

.role-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 22px;
}

.role-tab {
  flex: 1;
  padding: 7px;
  border: none;
  background: none;
  border-radius: 5px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-3);
  cursor: pointer;
  transition: all 0.15s;
}

.role-tab.active {
  background: var(--surface);
  color: var(--blue);
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}

.error-msg {
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  color: var(--red);
  margin-bottom: 16px;
  display: none;
}

.error-msg.show { display: block; }

.btn-login {
  width: 100%;
  padding: 11px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14.5px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 6px;
}

.btn-login:hover { background: #1d46d4; }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.divider {
  text-align: center;
  margin: 18px 0;
  color: var(--text-3);
  font-size: 12px;
  position: relative;
}

.divider::before, .divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 44%;
  height: 1px;
  background: var(--border);
}

.divider::before { left: 0; }
.divider::after  { right: 0; }

.btn-register {
  width: 100%;
  padding: 10px;
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13.5px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-register:hover {
  border-color: var(--blue);
  color: var(--blue);
}

#selfRegSection { display: none; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <div class="login-brand-icon">&#9881;</div>
    <div class="login-brand-name">VehicleParts<span>Pro</span></div>
  </div>

  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your account to continue</div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('Admin', this)">Admin</button>
      <button class="role-tab" onclick="setRole('Staff', this)">Staff</button>
      <button class="role-tab" onclick="setRole('Customer', this)">Customer</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="input" id="loginEmail" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="input" id="loginPassword" type="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div id="selfRegSection">
      <div class="divider">or</div>
      <button class="btn-register" onclick="openModal('regModal')">Create a customer account</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="regModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">Create Account</div>
      <button class="btn btn-outline btn-sm" onclick="closeModal('regModal')">Close</button>
    </div>
    <div class="error-msg" id="regError"></div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input class="input" id="rFirstName" placeholder="First name">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input class="input" id="rLastName" placeholder="Last name">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="input" id="rEmail" type="email" placeholder="Email address">
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input class="input" id="rPhone" placeholder="Phone number">
    </div>
    <div class="form-group">
      <label class="form-label">Address</label>
      <input class="input" id="rAddress" placeholder="Your address">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="input" id="rPassword" type="password" placeholder="Min 6 characters">
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('regModal')">Cancel</button>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
const user = getUser();
if (user) {
  if (user.role === 'Customer') window.location.href = 'portal-profile.html';
  else window.location.href = 'index.html';
}

let selectedRole = 'Admin';

function setRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('selfRegSection').style.display = role === 'Customer' ? 'block' : 'none';
  document.getElementById('errorMsg').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('Enter your email and password.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  document.getElementById('errorMsg').classList.remove('show');

  try {
    const res = await fetch(`${BASE_URL}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, role: selectedRole })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.message || 'Login failed.'); return; }
    sessionStorage.setItem('user', JSON.stringify(data));
    if (data.role === 'Customer') window.location.href = 'portal-profile.html';
    else window.location.href = 'index.html';
  } catch (e) {
    showError('Cannot connect to server. Is the backend running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function doRegister() {
  const body = {
    firstName: document.getElementById('rFirstName').value.trim(),
    lastName:  document.getElementById('rLastName').value.trim(),
    email:     document.getElementById('rEmail').value.trim(),
    phone:     document.getElementById('rPhone').value.trim(),
    address:   document.getElementById('rAddress').value.trim(),
    password:  document.getElementById('rPassword').value,
  };
  if (!body.firstName || !body.lastName || !body.email || !body.phone || !body.password) {
    const el = document.getElementById('regError');
    el.textContent = 'Please fill in all required fields.';
    el.classList.add('show');
    return;
  }
  try {
    const res = await fetch(`${BASE_URL}/customers/self-register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      const el = document.getElementById('regError');
      el.textContent = data.message || 'Registration failed.';
      el.classList.add('show');
      return;
    }
    closeModal('regModal');
    document.getElementById('loginEmail').value = body.email;
    document.querySelectorAll('.role-tab')[2].click();
    showError('');
    document.getElementById('errorMsg').classList.remove('show');
    alert('Account created. Please sign in.');
  } catch (e) {
    const el = document.getElementById('regError');
    el.textContent = 'Server error.';
    el.classList.add('show');
  }
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
});
</script>
</body>
</html>
